<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>User Manager</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" 
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <style>
        .vertical-nav {
            position: fixed;
            top: 0;
            right: 0;
            height: 100vh;
            width: 200px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            padding-top: 5rem;
            transition: transform 0.3s ease;
        }
        
        .vertical-nav.collapsed {
            transform: translateX(200px);
        }
        
        .toggle-nav-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1001;
        }
        
        .main-content {
            margin-right: 200px;
            transition: margin-right 0.3s ease;
        }
        
        .main-content.expanded {
            margin-right: 0;
        }

        @media (max-width: 768px) {
            .vertical-nav {
                position: static;
                height: auto;
                width: 100%;
                padding-top: 0;
                transform: none !important;
            }
            .toggle-nav-btn {
                display: none;
            }
            .main-content {
                margin-right: 0 !important;
            }
        }
    </style>
</head>

<body class="bg-light">

<button class="btn btn-dark toggle-nav-btn" id="toggleBtn">
    <i class="fas fa-bars"></i>
</button>

<nav class="vertical-nav bg-dark navbar-dark" id="sidebar">
    <ul class="navbar-nav w-100 px-3">
        <li class="nav-item mb-2">
            <a class="nav-link text-left pl-3" href="/register">
                <i class="fas fa-user-plus mr-2" style="width: 20px;"></i> Register
            </a>
        </li>
        <li class="nav-item mb-2">
            <a class="nav-link text-left pl-3" href="/login">
                <i class="fas fa-sign-in-alt mr-2" style="width: 20px;"></i> Login
            </a>
        </li>
    </ul>
</nav>

<div class="main-content" id="content">
    <div class="container text-center mt-5">
        <h1 class="mb-4">User Manager</h1>
        <p class="lead mb-5">
            Welcome to the User Management System
        </p>

        <div class="card shadow rounded text-left mx-auto" style="max-width: 800px;">
            <div class="card-body p-0">
                <table class="table table-hover table-striped mb-0">
                    <thead class="thead-dark">
                    <tr>
                        <th>Id</th>
                        <th>Username</th>
                        <th>Password</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="user : ${users}">
                        <td th:text="${user.id}"></td>
                        <td th:text="${user.username}"></td>
                        <td th:text="${user.password}"></td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.2.1.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/popper.js@1.12.9/dist/umd/popper.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/js/bootstrap.min.js"></script>

<script>
    document.getElementById('toggleBtn').addEventListener('click', function() {
        const sidebar = document.getElementById('sidebar');
        const content = document.getElementById('content');
        const icon = this.querySelector('i');
        
        sidebar.classList.toggle('collapsed');
        content.classList.toggle('expanded');
        
        if (sidebar.classList.contains('collapsed')) {
            icon.classList.remove('fa-bars');
            icon.classList.add('fa-chevron-left');
        } else {
            icon.classList.remove('fa-chevron-left');
            icon.classList.add('fa-bars');
        }
    });
</script>

</body>
</html>
