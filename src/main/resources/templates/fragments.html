<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

    <div th:fragment="sidebar">
        <button class="btn btn-dark toggle-nav-btn" id="toggleBtn">
            <i class="fas fa-bars"></i>
        </button>

        <nav class="vertical-nav bg-dark navbar-dark" id="sidebar">
            <ul class="navbar-nav w-100 px-3">
                <li class="nav-item mb-2">
                    <a class="nav-link text-left pl-3" href="/register">
                        <i class="fas fa-user-plus mr-2" style="width: 20px;"></i> Register
                    </a>
                </li>
                <li class="nav-item mb-2">
                    <a class="nav-link text-left pl-3" href="/login">
                        <i class="fas fa-sign-in-alt mr-2" style="width: 20px;"></i> Login
                    </a>
                </li>
            </ul>
        </nav>
    </div>

    <div th:fragment="userTable">
        <div class="card shadow rounded text-left mx-auto" style="max-width: 800px;">
            <div class="card-body p-0">
                <table class="table table-hover table-striped mb-0">
                    <thead class="thead-dark">
                    <tr>
                        <th>Id</th>
                        <th>Username</th>
                        <th>Password</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="user : ${users}">
                        <td th:text="${user.id}"></td>
                        <td th:text="${user.username}"></td>
                        <td th:text="${user.password}"></td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

</body>
</html>
